services:
  # Backend Service (serves both API and frontend)
  - type: web
    name: hostel-grievance-portal
    env: node
    repo: https://github.com/mayankchoudhary18/Hostel-Grievance-Portal
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_HOST
        fromDatabase:
          name: hgp-mysql
          property: host
      - key: DB_USER
        fromDatabase:
          name: hgp-mysql
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: hgp-mysql
          property: password
      - key: DB_NAME
        value: hostel_grievance_portal
      - key: JWT_SECRET
        generateValue: true

  # Database
  - type: pserv
    name: hgp-mysql
    env: mysql
    plan: free
    ipAllowList: []
    databases:
      - name: hostel_grievance_portal
        user: hgp_user
