<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Hostel Grievance Portal - Login to manage your complaints" />
  <title>Login | Hostel Grievance Portal</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">🏠</div>
        <h1>Hostel Grievance Portal</h1>
        <p>Login to your account</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email" name="email"
            placeholder="you@example.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password"
            placeholder="••••••••" required autocomplete="current-password" />
        </div>

        <div id="loginError" class="text-muted" style="color:#ef4444;font-size:0.85rem;margin-bottom:0.75rem;display:none;"></div>

        <button type="submit" class="btn-auth" id="loginBtn">
          <span id="loginBtnText">Sign In</span>
          <span id="loginSpinner" class="spinner" style="display:none;"></span>
        </button>
      </form>

      <div class="divider"></div>

      <p class="auth-link">
        Don't have an account? <a href="register.html">Register here</a>
      </p>
      <p class="auth-link" style="margin-top:0.5rem;font-size:0.8rem;color:rgba(255,255,255,0.5);">
        Admin? Use your admin credentials above.
      </p>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Load environment first, then auth -->
  <script src="js/env.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Test backend connection before proceeding
    async function initializePage() {
      console.log("🚀 Initializing login page...");
      const API_BASE = import.meta.env.VITE_API_BASE_URL;
      console.log("🔍 Checking API_BASE:", API_BASE);
      
      try {
        // First test the health endpoint
        console.log("🔍 Testing health endpoint...");
        const healthCheck = await testConnection();
        console.log("✅ Backend health check passed:", healthCheck);
        
        // Test the login endpoint specifically
        console.log("🔍 Testing login endpoint availability...");
        const loginTest = await fetch(API_BASE + '/api/login', {
          method: 'OPTIONS',
          mode: 'cors',
          cache: 'no-cache'
        });
        console.log("Login endpoint OPTIONS response:", loginTest.status);
        
        if (loginTest.status === 200 || loginTest.status === 204) {
          console.log("✅ Login endpoint is accessible");
        } else {
          console.warn("⚠️ Login endpoint may have issues, but proceeding...");
        }
        
        console.log("✅ Backend connection fully verified");
        
      } catch (error) {
        console.error("❌ Backend connection failed:", error);
        const errEl = document.getElementById('loginError');
        
        // Provide more specific error messages
        if (error.message.includes('timeout')) {
          errEl.textContent = 'Server is not responding. Please check if the backend server is running on port 5001 and try again.';
        } else if (error.message.includes('Failed to fetch')) {
          errEl.textContent = 'Cannot connect to server. Please check your internet connection and ensure the backend is running on https://hostel-grievance-portal.onrender.com/.';
        } else if (error.message.includes('CORS')) {
          errEl.textContent = 'CORS error. Please check server configuration.';
        } else {
          errEl.textContent = 'Connection error: ' + error.message + '. Please ensure backend server is running.';
        }
        
        errEl.style.display = 'block';
        
        // Add a retry button
        const retryBtn = document.createElement('button');
        retryBtn.textContent = 'Retry Connection';
        retryBtn.className = 'btn-auth';
        retryBtn.style.marginTop = '1rem';
        retryBtn.onclick = () => {
          errEl.style.display = 'none';
          retryBtn.remove();
          initializePage();
        };
        errEl.parentNode.appendChild(retryBtn);
        
        return;
      }
      
      // Check if already logged in
      const token = localStorage.getItem('token');
      const user = JSON.parse(localStorage.getItem('user') || 'null');
      if (token && user) {
        console.log("🔄 User already logged in, redirecting...");
        window.location.href = user.role === 'admin' ? 'admin-dashboard.html' : 'student-dashboard.html';
        return;
      }
      
      console.log("✅ Login page ready for use");
    }

    // Initialize page when DOM is ready
    document.addEventListener('DOMContentLoaded', initializePage);

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault(); // VERY IMPORTANT - prevents page refresh
      
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('loginBtnText');
      const spinner = document.getElementById('loginSpinner');
      const errEl = document.getElementById('loginError');

      // Reset state
      errEl.style.display = 'none';
      btnText.style.display = 'none';
      spinner.style.display = 'inline-block';
      btn.disabled = true;

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        console.log("🚀 Starting login request...");
        
        const response = await fetch(`${import.meta.env.VITE_API_BASE_URL}/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email,
            password
          })
        });

        const data = await response.json();
        console.log("✅ Login success:", data);

        if (response.ok) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("user", JSON.stringify(data.user));
          
          console.log("✅ User data stored, redirecting...");
          
          // Navigate to dashboard
          if (data.user.role === 'admin') {
            window.location.href = 'admin-dashboard.html';
          } else {
            window.location.href = 'student-dashboard.html';
          }
        } else {
          console.log("❌ Login failed:", data.message);
          errEl.textContent = data.message || "Login failed";
          errEl.style.display = 'block';
        }
        
      } catch (error) {
        console.error("💥 Login error:", error);
        errEl.textContent = "Server error. Please try again.";
        errEl.style.display = 'block';
      } finally {
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
