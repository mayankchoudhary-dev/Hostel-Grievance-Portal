<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Registration Module Test</h1>
    
    <div class="test-section info">
        <h2>Test Registration Form</h2>
        <form id="testForm">
            <div>
                <label>Name: <input type="text" id="testName" value="Test Student" required></label><br><br>
                <label>Email: <input type="email" id="testEmail" value="test@student.com" required></label><br><br>
                <label>Room: <input type="text" id="testRoom" value="A-101" required></label><br><br>
                <label>Password: <input type="password" id="testPassword" value="test123" required></label><br><br>
                <label>Confirm: <input type="password" id="testConfirm" value="test123" required></label><br><br>
                <button type="submit">Test Registration</button>
            </div>
        </form>
    </div>

    <div class="test-section info">
        <h2>Connection Tests</h2>
        <button onclick="testBackendConnection()">Test Backend Connection</button>
        <button onclick="testRegistrationEndpoint()">Test Registration Endpoint</button>
        <button onclick="testDatabaseConnection()">Test Database Connection</button>
    </div>

    <div id="results"></div>

    <script>
        window.API_BASE = 'http://localhost:5001';
        
        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-section ${type}`;
            div.innerHTML = `<h3>${new Date().toLocaleTimeString()}</h3><pre>${JSON.stringify(message, null, 2)}</pre>`;
            results.appendChild(div);
        }

        async function testBackendConnection() {
            log('Testing backend connection...', 'info');
            try {
                const response = await fetch(`${window.API_BASE}/api/health`);
                const data = await response.json();
                log(`Backend connection successful: ${JSON.stringify(data)}`, 'success');
            } catch (error) {
                log(`Backend connection failed: ${error.message}`, 'error');
            }
        }

        async function testRegistrationEndpoint() {
            log('Testing registration endpoint...', 'info');
            try {
                const response = await fetch(`${window.API_BASE}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: 'Test User',
                        email: 'test@example.com',
                        password: 'test123',
                        room_no: 'A-101'
                    })
                });
                const data = await response.json();
                log(`Registration endpoint response: ${JSON.stringify(data)}`, response.ok ? 'success' : 'error');
            } catch (error) {
                log(`Registration endpoint test failed: ${error.message}`, 'error');
            }
        }

        async function testDatabaseConnection() {
            log('Testing database connection...', 'info');
            try {
                const response = await fetch(`${window.API_BASE}/api/debug`);
                const data = await response.json();
                log(`Database connection test: ${JSON.stringify(data)}`, 'success');
            } catch (error) {
                log(`Database connection test failed: ${error.message}`, 'error');
            }
        }

        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('testName').value,
                email: document.getElementById('testEmail').value,
                room_no: document.getElementById('testRoom').value,
                password: document.getElementById('testPassword').value,
                confirmPassword: document.getElementById('testConfirm').value
            };

            log('Testing registration with form data...', 'info');
            
            if (formData.password !== formData.confirmPassword) {
                log('Passwords do not match!', 'error');
                return;
            }

            try {
                const response = await fetch(`${window.API_BASE}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: formData.name,
                        email: formData.email,
                        password: formData.password,
                        room_no: formData.room_no
                    })
                });

                const data = await response.json();
                
                if (response.ok && data.success) {
                    log(`Registration successful! User created: ${JSON.stringify(data)}`, 'success');
                } else {
                    log(`Registration failed: ${JSON.stringify(data)}`, 'error');
                }
            } catch (error) {
                log(`Registration test failed: ${error.message}`, 'error');
            }
        });

        // Auto-run connection test on page load
        window.addEventListener('load', () => {
            setTimeout(testBackendConnection, 1000);
        });
    </script>
</body>
</html>
