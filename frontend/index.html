<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Hostel Grievance Portal - Login to manage your complaints" />
  <title>Login | Hostel Grievance Portal</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">🏠</div>
        <h1>Hostel Grievance Portal</h1>
        <p>Login to your account</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email" name="email"
            placeholder="you@example.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password"
            placeholder="••••••••" required autocomplete="current-password" />
        </div>

        <div id="loginError" class="text-muted" style="color:#ef4444;font-size:0.85rem;margin-bottom:0.75rem;display:none;"></div>

        <button type="submit" class="btn-auth" id="loginBtn">
          <span id="loginBtnText">Sign In</span>
          <span id="loginSpinner" class="spinner" style="display:none;"></span>
        </button>
      </form>

      <div class="divider"></div>

      <p class="auth-link">
        Don't have an account? <a href="register.html">Register here</a>
      </p>
      <p class="auth-link" style="margin-top:0.5rem;font-size:0.8rem;color:rgba(255,255,255,0.5);">
        Admin? Use your admin credentials above.
      </p>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Load environment first, then auth -->
  <script src="js/env.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Test backend connection before proceeding
    async function initializePage() {
      console.log("🚀 Initializing login page...");
      console.log("🔍 Checking API_BASE:", window.ENV.API_BASE_URL);
      
      try {
        // First test the health endpoint
        console.log("🔍 Testing health endpoint...");
        const healthCheck = await testConnection();
        console.log("✅ Backend health check passed:", healthCheck);
        
        // Test the login endpoint specifically
        console.log("🔍 Testing login endpoint availability...");
        const loginTest = await fetch(window.ENV.API_BASE_URL + '/api/login', {
          method: 'OPTIONS',
          mode: 'cors',
          cache: 'no-cache'
        });
        console.log("Login endpoint OPTIONS response:", loginTest.status);
        
        if (loginTest.status === 200 || loginTest.status === 204) {
          console.log("✅ Login endpoint is accessible");
        } else {
          console.warn("⚠️ Login endpoint may have issues, but proceeding...");
        }
        
        console.log("✅ Backend connection fully verified");
        
      } catch (error) {
        console.error("❌ Backend connection failed:", error);
        const errEl = document.getElementById('loginError');
        
        // Provide more specific error messages
        if (error.message.includes('timeout')) {
          errEl.textContent = 'Server is not responding. Please check if the backend server is running on port 5001 and try again.';
        } else if (error.message.includes('Failed to fetch')) {
          errEl.textContent = 'Cannot connect to server. Please check your internet connection and ensure the backend is running on http://localhost:5001.';
        } else if (error.message.includes('CORS')) {
          errEl.textContent = 'CORS error. Please check server configuration.';
        } else {
          errEl.textContent = 'Connection error: ' + error.message + '. Please ensure backend server is running.';
        }
        
        errEl.style.display = 'block';
        
        // Add a retry button
        const retryBtn = document.createElement('button');
        retryBtn.textContent = 'Retry Connection';
        retryBtn.className = 'btn-auth';
        retryBtn.style.marginTop = '1rem';
        retryBtn.onclick = () => {
          errEl.style.display = 'none';
          retryBtn.remove();
          initializePage();
        };
        errEl.parentNode.appendChild(retryBtn);
        
        return;
      }
      
      // Check if already logged in
      const token = localStorage.getItem('token');
      const user = JSON.parse(localStorage.getItem('user') || 'null');
      if (token && user) {
        console.log("🔄 User already logged in, redirecting...");
        window.location.href = user.role === 'admin' ? 'admin-dashboard.html' : 'student-dashboard.html';
        return;
      }
      
      console.log("✅ Login page ready for use");
    }

    // Initialize page when DOM is ready
    document.addEventListener('DOMContentLoaded', initializePage);

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('loginBtnText');
      const spinner = document.getElementById('loginSpinner');
      const errEl = document.getElementById('loginError');

      errEl.style.display = 'none';
      btnText.style.display = 'none';
      spinner.style.display = 'inline-block';
      btn.disabled = true;

      // Add timeout to prevent infinite loading
      const loadingTimeout = setTimeout(() => {
        if (btn.disabled) {
          console.error("⚠️ Login request timed out");
          errEl.textContent = 'Login request timed out. Please try again.';
          errEl.style.display = 'block';
          
          btnText.style.display = 'inline';
          spinner.style.display = 'none';
          btn.disabled = false;
        }
      }, 15000); // 15 second timeout

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        console.log("🚀 Starting login request...");
        
        // Try the regular apiPost first
        let data;
        try {
          data = await apiPost('/api/login', { email, password });
        } catch (apiError) {
          console.error("❌ apiPost failed, trying direct fetch:", apiError);
          
          // Fallback to direct fetch
          console.log("🔄 Attempting direct fetch to:", API_BASE + '/api/login');
          console.log("📤 Request payload:", { email, password });
          
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 10000);
          
          const res = await fetch(API_BASE + '/api/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email, password }),
            mode: 'cors',
            cache: 'no-cache',
            signal: controller.signal
          });
          
          clearTimeout(timeoutId);
          
          console.log("📥 Response status:", res.status);
          console.log("📥 Response headers:", Object.fromEntries(res.headers.entries()));
          
          if (!res.ok) {
            const errorText = await res.text();
            console.error("❌ Direct fetch failed:", res.status, errorText);
            throw new Error(`HTTP ${res.status}: ${res.statusText}`);
          }
          
          const responseText = await res.text();
          console.log("📄 Raw response text:", responseText);
          
          if (!responseText || responseText.trim() === '') {
            throw new Error('Empty response from server');
          }
          
          try {
            data = JSON.parse(responseText);
          } catch (parseError) {
            console.error("❌ JSON parse failed:", parseError);
            throw new Error('Invalid JSON response from server');
          }
          
          console.log("✅ Direct fetch successful:", data);
        }
        
        clearTimeout(loadingTimeout);
        
        console.log("✅ Login successful:", data);
        
        // Validate response structure
        if (!data || typeof data !== 'object') {
          throw new Error('Invalid server response. Please try again.');
        }
        
        if (!data.success) {
          throw new Error(data.message || 'Login failed. Please check your credentials.');
        }
        
        if (!data.token) {
          throw new Error('Server did not return authentication token. Please try again.');
        }
        
        if (!data.user) {
          throw new Error('Server did not return user information. Please try again.');
        }
        
        // Store user data
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        
        console.log("✅ User data stored:", {
          token: data.token ? 'Present' : 'Missing',
          user: data.user ? 'Present' : 'Missing',
          role: data.user?.role || 'Unknown'
        });
        
        showToast('Welcome back, ' + data.user.name + '!', 'success');
        setTimeout(() => {
          window.location.href = data.user.role === 'admin'
            ? 'admin-dashboard.html'
            : 'student-dashboard.html';
        }, 600);
      } catch (err) {
        clearTimeout(loadingTimeout);
        console.error("❌ Login failed:", err);
        
        // Provide specific error messages
        let errorMessage = err.message || 'Login failed. Please try again.';
        
        if (err.message.includes('token')) {
          errorMessage = 'Authentication issue. Please try again.';
        } else if (err.message.includes('network') || err.message.includes('fetch')) {
          errorMessage = 'Network error. Please check your connection and try again.';
        } else if (err.message.includes('timeout')) {
          errorMessage = 'Request timed out. Please try again.';
        } else if (err.message.includes('credentials') || err.message.includes('Invalid')) {
          errorMessage = 'Invalid email or password. Please try again.';
        } else if (err.message.includes('401')) {
          errorMessage = 'Invalid credentials. Please check your email and password.';
        } else if (err.message.includes('404')) {
          errorMessage = 'Login endpoint not found. Please check if the backend server is running correctly.';
        }
        
        errEl.textContent = errorMessage;
        errEl.style.display = 'block';
      } finally {
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
