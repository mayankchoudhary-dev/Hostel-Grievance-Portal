<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Upload Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
        .image-preview { max-width: 300px; max-height: 300px; margin: 10px 0; border: 1px solid #ddd; }
        .file-upload { border: 2px dashed #ccc; padding: 20px; text-align: center; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Image Upload & Display Test</h1>
    
    <div class="test-section info">
        <h2>Test Image Upload</h2>
        <form id="imageTestForm">
            <div>
                <label>Title: <input type="text" id="testTitle" value="Test Image Complaint" required></label><br><br>
                <label>Category: 
                    <select id="testCategory">
                        <option value="Other">Other</option>
                        <option value="Electricity">Electricity</option>
                        <option value="Water">Water</option>
                    </select>
                </label><br><br>
                <label>Priority: 
                    <select id="testPriority">
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                        <option value="Low">Low</option>
                    </select>
                </label><br><br>
                <label>Description: <textarea id="testDesc" rows="3">Test complaint with image</textarea></label><br><br>
                
                <div class="file-upload">
                    <input type="file" id="testImage" accept="image/*" />
                    <div>Click to select image or drag & drop</div>
                    <div id="imagePreview"></div>
                </div>
                
                <br><button type="submit">Submit Test Complaint</button>
            </div>
        </form>
    </div>

    <div class="test-section info">
        <h2>Backend Tests</h2>
        <button onclick="testImageEndpoint()">Test Image Serving</button>
        <button onclick="listUploadedImages()">List Uploaded Images</button>
        <button onclick="testExistingImages()">Test Existing Image URLs</button>
    </div>

    <div id="results"></div>

    <script>
        window.API_BASE = 'http://localhost:5001';
        
        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-section ${type}`;
            div.innerHTML = `<h3>${new Date().toLocaleTimeString()}</h3><pre>${JSON.stringify(message, null, 2)}</pre>`;
            results.appendChild(div);
        }

        // Image preview
        document.getElementById('testImage').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const preview = document.getElementById('imagePreview');
            
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.innerHTML = `<img src="${e.target.result}" class="image-preview" alt="Preview">`;
                };
                reader.readAsDataURL(file);
            } else {
                preview.innerHTML = '';
            }
        });

        async function testImageEndpoint() {
            log('Testing image serving endpoint...', 'info');
            try {
                const response = await fetch(`${window.API_BASE}/uploads/1775204357232-909725816-Screenshot 2026-04-03 130133.png`);
                log(`Image endpoint test - Status: ${response.status}, Headers: ${JSON.stringify(Object.fromEntries(response.headers.entries()))}`, response.ok ? 'success' : 'error');
                
                if (response.ok) {
                    const blob = await response.blob();
                    log(`Image size: ${blob.size} bytes, type: ${blob.type}`, 'success');
                }
            } catch (error) {
                log(`Image endpoint test failed: ${error.message}`, 'error');
            }
        }

        async function listUploadedImages() {
            log('Testing image listing endpoint...', 'info');
            try {
                const response = await fetch(`${window.API_BASE}/api/test-images`);
                const data = await response.json();
                log(`Uploaded images list: ${JSON.stringify(data)}`, response.ok ? 'success' : 'error');
            } catch (error) {
                log(`Image listing test failed: ${error.message}`, 'error');
            }
        }

        async function testExistingImages() {
            log('Testing existing image URLs...', 'info');
            const testImages = [
                '1775204357232-909725816-Screenshot 2026-04-03 130133.png',
                '1775204783321-108096103-Screenshot 2026-04-03 130123.png',
                '1775208965168-373557860-focus wallpaper.webp'
            ];

            for (const imageName of testImages) {
                try {
                    const response = await fetch(`${window.API_BASE}/uploads/${imageName}`);
                    log(`Image ${imageName}: Status ${response.status} ${response.ok ? 'OK' : 'FAILED'}`, response.ok ? 'success' : 'error');
                } catch (error) {
                    log(`Image ${imageName} failed: ${error.message}`, 'error');
                }
            }
        }

        document.getElementById('imageTestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('title', document.getElementById('testTitle').value);
            formData.append('category', document.getElementById('testCategory').value);
            formData.append('priority', document.getElementById('testPriority').value);
            formData.append('description', document.getElementById('testDesc').value);
            
            const imageFile = document.getElementById('testImage').files[0];
            if (imageFile) {
                formData.append('image', imageFile);
                log(`Adding image: ${imageFile.name}, size: ${imageFile.size} bytes`, 'info');
            } else {
                log('No image selected', 'info');
            }

            log('Submitting complaint with image...', 'info');
            
            try {
                const response = await fetch(`${window.API_BASE}/api/complaints`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token') || 'test-token'}`
                    },
                    body: formData
                });

                const data = await response.json();
                
                if (response.ok && data.success) {
                    log(`Complaint submitted successfully! Image URL: ${data.complaint?.image_url || 'No image'}`, 'success');
                    
                    // Test the image URL if it exists
                    if (data.complaint?.image_url) {
                        setTimeout(() => {
                            const imgResponse = fetch(`${window.API_BASE}${data.complaint.image_url}`)
                                .then(r => log(`Image accessibility test: Status ${r.status}`, r.ok ? 'success' : 'error'))
                                .catch(e => log(`Image accessibility failed: ${e.message}`, 'error'));
                        }, 1000);
                    }
                } else {
                    log(`Complaint submission failed: ${JSON.stringify(data)}`, 'error');
                }
            } catch (error) {
                log(`Complaint submission failed: ${error.message}`, 'error');
            }
        });

        // Auto-run image tests on page load
        window.addEventListener('load', () => {
            setTimeout(() => {
                testImageEndpoint();
                setTimeout(listUploadedImages, 500);
                setTimeout(testExistingImages, 1000);
            }, 1000);
        });
    </script>
</body>
</html>
