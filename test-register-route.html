<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Route Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .route-test { display: inline-block; margin: 10px; padding: 15px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>Register Route Test</h1>
    
    <div class="test-section info">
        <h2>Test Register Page Access</h2>
        <p>This page tests if register.html is properly served by the frontend server.</p>
        
        <button onclick="testRegisterRoute()">Test Register Route</button>
        <button onclick="testAllRoutes()">Test All Routes</button>
        <button onclick="window.location.href='/register.html'">Go to Register Page</button>
        <button onclick="clearResults()">Clear Results</button>
    </div>

    <div id="results"></div>

    <script>
        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-section ${type}`;
            div.innerHTML = `<h3>${new Date().toLocaleTimeString()}</h3><pre>${JSON.stringify(message, null, 2)}</pre>`;
            results.appendChild(div);
        }

        function testRegisterRoute() {
            log('Testing register.html route...', 'info');
            
            fetch('/register.html')
                .then(response => {
                    if (response.ok) {
                        log(`✅ Register route works! Status: ${response.status}`, 'success');
                    } else {
                        log(`❌ Register route failed! Status: ${response.status}`, 'error');
                    }
                })
                .catch(error => {
                    log(`❌ Network error: ${error.message}`, 'error');
                });
        }

        function testAllRoutes() {
            log('Testing all frontend routes...', 'info');
            
            const routes = [
                '/',
                '/index.html',
                '/register.html',
                '/admin-dashboard.html',
                '/student-dashboard.html',
                '/health'
            ];
            
            let completed = 0;
            
            routes.forEach(route => {
                fetch(route)
                    .then(response => {
                        completed++;
                        log(`✅ ${route} - Status: ${response.status}`, 'success');
                    })
                    .catch(error => {
                        completed++;
                        log(`❌ ${route} - Error: ${error.message}`, 'error');
                    })
                    .finally(() => {
                        if (completed === routes.length) {
                            log('All routes tested!', 'info');
                        }
                    });
            });
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        // Auto-run on page load
        window.addEventListener('load', () => {
            log('Register route test page loaded', 'info');
            log('Current URL:', window.location.href);
            log('Testing server connectivity...', 'info');
            
            // Test server health
            fetch('/health')
                .then(response => response.json())
                .then(data => {
                    log('✅ Frontend server is healthy', 'success');
                    log('Server response:', data);
                })
                .catch(error => {
                    log('❌ Frontend server not responding', 'error');
                    log('Error:', error.message);
                });
        });
    </script>
</body>
</html>
