<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Logout Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Admin Logout Test</h1>
    
    <div class="test-section info">
        <h2>Test Admin Logout Function</h2>
        <p>This page tests the admin logout functionality with multiple redirect methods.</p>
        
        <button onclick="testAdminLogout()">Test Admin Logout</button>
        <button onclick="testRedirectMethods()">Test All Redirect Methods</button>
        <button onclick="clearResults()">Clear Results</button>
    </div>

    <div id="results"></div>

    <script src="js/auth.js"></script>
    <script>
        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-section ${type}`;
            div.innerHTML = `<h3>${new Date().toLocaleTimeString()}</h3><pre>${JSON.stringify(message, null, 2)}</pre>`;
            results.appendChild(div);
        }

        function testAdminLogout() {
            log('Testing admin logout...', 'info');
            
            // Simulate admin user data
            localStorage.setItem('token', 'test-admin-token');
            localStorage.setItem('user', JSON.stringify({
                id: 1,
                name: 'Test Admin',
                email: 'admin@test.com',
                role: 'admin'
            }));
            
            log('Admin user simulated, testing logout...', 'info');
            
            // Test the logout function
            setTimeout(() => {
                logout();
                log('Logout function called, monitoring redirects...', 'info');
            }, 1000);
        }

        function testRedirectMethods() {
            log('Testing all redirect methods...', 'info');
            
            const redirects = [
                'http://localhost:5500/index.html',
                'http://127.0.0.1:5500/index.html',
                'index.html',
                '../index.html',
                './index.html'
            ];
            
            redirects.forEach((url, index) => {
                log(`Testing redirect method ${index + 1}: ${url}`, 'info');
                
                if (url.startsWith('http')) {
                    // Test HTTP URLs
                    fetch(url.replace('/index.html', '/health'), { 
                        mode: 'no-cors',
                        signal: AbortSignal.timeout(1000)
                    })
                    .then(() => log(`✅ Method ${index + 1} works: ${url}`, 'success'))
                    .catch(() => log(`❌ Method ${index + 1} failed: ${url}`, 'error'));
                } else {
                    // Test file URLs
                    log(`📁 File redirect ${index + 1}: ${url}`, 'info');
                }
            });
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        // Auto-run on page load
        window.addEventListener('load', () => {
            log('Admin logout test page loaded', 'info');
            log('Current localStorage:', {
                token: localStorage.getItem('token'),
                user: localStorage.getItem('user')
            });
        });
    </script>
</body>
</html>
