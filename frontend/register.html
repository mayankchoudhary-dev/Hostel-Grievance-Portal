<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Register as a student on the Hostel Grievance Portal" />
  <title>Register | Hostel Grievance Portal</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 1rem;
    }
    
    .auth-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
      width: 100%;
      max-width: 500px;
    }
    
    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .logo-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    
    .auth-logo h1 {
      color: white;
      margin-bottom: 0.5rem;
      font-size: 2rem;
    }
    
    .auth-logo p {
      color: rgba(255, 255, 255, 0.8);
      margin: 0;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-label {
      display: block;
      color: white;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
    
    .form-input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    
    .form-input:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
    }
    
    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }
    
    .password-strength {
      margin-top: 0.5rem;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.2);
      overflow: hidden;
    }
    
    .password-strength-bar {
      height: 100%;
      transition: width 0.3s ease, background-color 0.3s ease;
    }
    
    .strength-weak { background: #ef4444; width: 33%; }
    .strength-medium { background: #f59e0b; width: 66%; }
    .strength-strong { background: #10b981; width: 100%; }
    
    .btn-auth {
      width: 100%;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
    }
    
    .btn-auth:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.2);
      margin: 1.5rem 0;
    }
    
    .auth-link {
      text-align: center;
      color: rgba(255, 255, 255, 0.8);
      margin: 0;
    }
    
    .auth-link a {
      color: white;
      text-decoration: none;
      font-weight: 600;
    }
    
    .auth-link a:hover {
      text-decoration: underline;
    }
    
    .error-message {
      color: #ef4444;
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
      padding: 0.5rem;
      background: rgba(239, 68, 68, 0.1);
      border-radius: 5px;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    
    .success-message {
      color: #10b981;
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
      padding: 0.5rem;
      background: rgba(16, 185, 129, 0.1);
      border-radius: 5px;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }
    
    .requirements {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">🎓</div>
        <h1>Create Account</h1>
        <p>Register as a hostel student</p>
      </div>

      <!-- Debug Panel -->
      <div id="debugPanel" style="background: rgba(0,0,0,0.2); padding: 0.5rem; border-radius: 5px; margin-bottom: 1rem; font-size: 0.8rem; color: #ccc; display: none;">
        <div><strong>Debug Info:</strong></div>
        <div id="debugInfo"></div>
      </div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <input class="form-input" type="text" id="name" name="name"
            placeholder="John Doe" required autocomplete="name" />
          <div class="requirements">Please enter your full name as per college records</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email" name="email"
            placeholder="you@example.com" required autocomplete="email" />
          <div class="requirements">Use your college email address</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="room_no">Room Number</label>
          <input class="form-input" type="text" id="room_no" name="room_no"
            placeholder="e.g. A-101" required />
          <div class="requirements">Format: Block-Room (e.g., A-101, B-205)</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password"
            placeholder="Minimum 6 characters" required autocomplete="new-password" />
          <div class="password-strength">
            <div class="password-strength-bar" id="passwordStrengthBar"></div>
          </div>
          <div class="requirements">Must be at least 6 characters with letters and numbers</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input class="form-input" type="password" id="confirmPassword" name="confirmPassword"
            placeholder="Re-enter password" required autocomplete="new-password" />
        </div>

        <div id="registerMessage" style="display:none;"></div>

        <button type="submit" class="btn-auth" id="registerBtn">
          <span id="registerBtnText">Create Account</span>
          <span id="registerSpinner" class="spinner" style="display:none;"></span>
        </button>
      </form>

      <div class="divider"></div>
      <p class="auth-link">Already have an account? <a href="index.html">Sign in</a></p>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  
  <!-- Load environment first, then auth -->
  <script src="js/env.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Test backend connection before proceeding
    async function initializePage() {
      console.log("🚀 Initializing registration page...");
      const API_BASE = import.meta.env.VITE_API_BASE_URL;
      console.log("🔍 Checking API_BASE:", API_BASE);
      
      // Clean up old tokens to avoid conflicts
      console.log("🧹 Cleaning up old tokens...");
      localStorage.removeItem('hgp_token');
      localStorage.removeItem('hgp_user');
      console.log("🧹 Old tokens removed");
      
      // Show debug panel
      const debugPanel = document.getElementById('debugPanel');
      const debugInfo = document.getElementById('debugInfo');
      debugPanel.style.display = 'block';
      
      debugInfo.innerHTML = `
        API_BASE: ${API_BASE}<br>
        User Agent: ${navigator.userAgent}<br>
        Current URL: ${window.location.href}<br>
        LocalStorage: ${JSON.stringify(localStorage)}<br>
        Status: <span style="color: yellow;">Testing connection...</span>
      `;
      
      try {
        // First test health endpoint
        debugInfo.innerHTML += '<br>Step 1: Testing health endpoint...';
        const healthCheck = await testConnection();
        console.log("✅ Backend health check passed:", healthCheck);
        debugInfo.innerHTML += '<br>✅ Health check passed';
        
        // Test register endpoint specifically
        debugInfo.innerHTML += '<br>Step 2: Testing register endpoint...';
        console.log("🔍 Testing register endpoint availability...");
        const registerTest = await fetch(API_BASE + '/api/register', {
          method: 'OPTIONS',
          mode: 'cors',
          cache: 'no-cache'
        });
        console.log("Register endpoint OPTIONS response:", registerTest.status);
        debugInfo.innerHTML += `<br>Register endpoint status: ${registerTest.status}`;
        
        if (registerTest.status === 200 || registerTest.status === 204) {
          console.log("✅ Register endpoint is accessible");
          debugInfo.innerHTML += '<br>✅ Register endpoint accessible';
        } else {
          console.warn("⚠️ Register endpoint may have issues, but proceeding...");
          debugInfo.innerHTML += '<br>⚠️ Register endpoint may have issues';
        }
        
        console.log("✅ Backend connection fully verified");
        debugInfo.innerHTML += '<br><span style="color: green;">✅ Backend connection verified</span>';
        
        // Hide debug panel after 3 seconds if everything is working
        setTimeout(() => {
          debugPanel.style.display = 'none';
        }, 3000);
        
      } catch (error) {
        console.error("❌ Backend connection failed:", error);
        debugInfo.innerHTML += `<br><span style="color: red;">❌ Connection failed: ${error.message}</span>`;
        
        const messageEl = document.getElementById('registerMessage');
        
        // Provide more specific error messages
        if (error.message.includes('timeout')) {
          messageEl.textContent = 'Server is not responding. Please check if the backend server is running on port 5001 and try again.';
        } else if (error.message.includes('Failed to fetch')) {
          messageEl.textContent = 'Cannot connect to server. Please check your internet connection and ensure the backend is running on https://hostel-grievance-portal.onrender.com/.';
        } else if (error.message.includes('CORS')) {
          messageEl.textContent = 'CORS error. Please check server configuration.';
        } else {
          messageEl.textContent = 'Connection error: ' + error.message + '. Please try again.';
        }
        
        messageEl.className = 'error-message';
        messageEl.style.display = 'block';
        
        // Add a retry button
        const retryBtn = document.createElement('button');
        retryBtn.textContent = 'Retry Connection';
        retryBtn.className = 'btn-auth';
        retryBtn.style.marginTop = '1rem';
        retryBtn.onclick = () => {
          messageEl.style.display = 'none';
          retryBtn.remove();
          initializePage();
        };
        messageEl.parentNode.appendChild(retryBtn);
        
        return;
      }
      
      // Check if already logged in with NEW token format
      const token = localStorage.getItem('token');
      const user = JSON.parse(localStorage.getItem('user') || 'null');
      if (token && user) {
        console.log("🔄 User already logged in, redirecting...");
        window.location.href = user.role === 'admin' ? 'admin-dashboard.html' : 'student-dashboard.html';
        return;
      }
      
      console.log("✅ Registration page ready for use");
    }

    // Initialize page when DOM is ready
    document.addEventListener('DOMContentLoaded', initializePage);

    // Password strength checker
    function checkPasswordStrength(password) {
      const strengthBar = document.getElementById('passwordStrengthBar');
      let strength = 0;
      
      if (password.length >= 6) strength++;
      if (password.length >= 10) strength++;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;
      if (/[^a-zA-Z0-9]/.test(password)) strength++;
      
      strengthBar.className = 'password-strength-bar';
      if (strength <= 2) strengthBar.classList.add('strength-weak');
      else if (strength <= 4) strengthBar.classList.add('strength-medium');
      else strengthBar.classList.add('strength-strong');
      
      return strength;
    }

    // Real-time password validation
    document.getElementById('password').addEventListener('input', (e) => {
      checkPasswordStrength(e.target.value);
      
      const confirmPassword = document.getElementById('confirmPassword').value;
      if (confirmPassword && e.target.value !== confirmPassword) {
        document.getElementById('confirmPassword').style.borderColor = '#ef4444';
      } else if (confirmPassword && e.target.value === confirmPassword) {
        document.getElementById('confirmPassword').style.borderColor = '#10b981';
      }
    });

    // Confirm password validation
    document.getElementById('confirmPassword').addEventListener('input', (e) => {
      const password = document.getElementById('password').value;
      if (e.target.value !== password) {
        e.target.style.borderColor = '#ef4444';
      } else {
        e.target.style.borderColor = '#10b981';
      }
    });

    // Form submission
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      const btnText = document.getElementById('registerBtnText');
      const spinner = document.getElementById('registerSpinner');
      const messageEl = document.getElementById('registerMessage');

      // Hide previous messages
      messageEl.style.display = 'none';
      messageEl.className = '';

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const room_no = document.getElementById('room_no').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Validation
      if (!name || !email || !room_no || !password) {
        messageEl.textContent = 'All fields are required.';
        messageEl.className = 'error-message';
        messageEl.style.display = 'block';
        return;
      }
      
      if (password !== confirmPassword) {
        messageEl.textContent = 'Passwords do not match.';
        messageEl.className = 'error-message';
        messageEl.style.display = 'block';
        return;
      }
      
      if (password.length < 6) {
        messageEl.textContent = 'Password must be at least 6 characters.';
        messageEl.className = 'error-message';
        messageEl.style.display = 'block';
        return;
      }
      
      if (checkPasswordStrength(password) <= 2) {
        messageEl.textContent = 'Please choose a stronger password with letters and numbers.';
        messageEl.className = 'error-message';
        messageEl.style.display = 'block';
        return;
      }
      
      if (!/^[A-Za-z]-\d+$/.test(room_no)) {
        messageEl.textContent = 'Room number must be in format: Block-Room (e.g., A-101).';
        messageEl.className = 'error-message';
        messageEl.style.display = 'block';
        return;
      }
      
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        messageEl.textContent = 'Please enter a valid email address.';
        messageEl.className = 'error-message';
        messageEl.style.display = 'block';
        return;
      }

      // Show loading state
      btnText.style.display = 'none';
      spinner.style.display = 'inline-block';
      btn.disabled = true;

      // Add timeout to prevent infinite loading
      const loadingTimeout = setTimeout(() => {
        if (btn.disabled) {
          console.error("⚠️ Registration request timed out");
          messageEl.textContent = 'Registration request timed out. Please try again.';
          messageEl.className = 'error-message';
          messageEl.style.display = 'block';
          
          btnText.style.display = 'inline';
          spinner.style.display = 'none';
          btn.disabled = false;
        }
      }, 15000); // 15 second timeout

      try {
        console.log("🚀 Starting registration request...");
        const data = await apiPost('/api/register', { name, email, password, room_no });
        clearTimeout(loadingTimeout);
        
        console.log("✅ Registration successful:", data);
        
        // Validate response structure
        if (!data || typeof data !== 'object') {
          throw new Error('Invalid server response. Please try again.');
        }
        
        if (!data.success) {
          throw new Error(data.message || 'Registration failed. Please try again.');
        }
        
        if (!data.token) {
          throw new Error('Server did not return authentication token. Please try logging in manually.');
        }
        
        if (!data.user) {
          throw new Error('Server did not return user information. Please try again.');
        }
        
        // Store user data
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        
        console.log("✅ User data stored:", {
          token: data.token ? 'Present' : 'Missing',
          user: data.user ? 'Present' : 'Missing'
        });
        
        // Show success message
        messageEl.textContent = 'Account created successfully! Redirecting to dashboard...';
        messageEl.className = 'success-message';
        messageEl.style.display = 'block';
        
        showToast('Welcome to Hostel Grievance Portal, ' + data.user.name + '!', 'success');
        
        // Redirect to dashboard
        setTimeout(() => { 
          window.location.href = 'student-dashboard.html'; 
        }, 1500);
        
      } catch (err) {
        clearTimeout(loadingTimeout);
        console.error("❌ Registration failed:", err);
        
        // Provide specific error messages
        let errorMessage = err.message || 'Registration failed. Please try again.';
        
        if (err.message.includes('token')) {
          errorMessage = 'Authentication issue. Please try logging in after registration.';
        } else if (err.message.includes('network') || err.message.includes('fetch')) {
          errorMessage = 'Network error. Please check your connection and try again.';
        } else if (err.message.includes('timeout')) {
          errorMessage = 'Request timed out. Please try again.';
        }
        
        messageEl.textContent = errorMessage;
        messageEl.className = 'error-message';
        messageEl.style.display = 'block';
      } finally {
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
