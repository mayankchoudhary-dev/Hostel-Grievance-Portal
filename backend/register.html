<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 50px auto;
      padding: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      background: #007bff;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .message {
      margin-top: 15px;
      padding: 10px;
      border-radius: 4px;
    }
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>
  <h1>Register Page Working</h1>
  <p>Create your hostel grievance portal account</p>

  <form id="form">
    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="Enter your full name" required />
    </div>
    
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email" required />
    </div>
    
    <div class="form-group">
      <label for="room_no">Room Number</label>
      <input type="text" id="room_no" placeholder="e.g. A-101" required />
    </div>
    
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" required />
    </div>
    
    <button type="submit">Register</button>
  </form>

  <div id="message"></div>

  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const room_no = document.getElementById('room_no').value;
      const password = document.getElementById('password').value;
      const messageDiv = document.getElementById('message');

      try {
        const res = await fetch('http://localhost:5001/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: name,
            email: email,
            room_no: room_no,
            password: password
          })
        });

        const data = await res.json();
        
        if (data.success) {
          messageDiv.innerHTML = '<div class="success">Registration successful! Redirecting to login...</div>';
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 2000);
        } else {
          messageDiv.innerHTML = '<div class="error">Registration failed: ' + (data.message || 'Unknown error') + '</div>';
        }
        
      } catch (error) {
        messageDiv.innerHTML = '<div class="error">Network error: ' + error.message + '</div>';
      }
    });
  </script>
</body>
</html>
