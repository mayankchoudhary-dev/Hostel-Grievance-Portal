<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Image Paths</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
        .image-test { border: 1px solid #ddd; margin: 10px 0; padding: 10px; }
        .image-test img { max-width: 200px; max-height: 200px; border: 1px solid #ccc; }
        button { padding: 8px 16px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Debug Image Paths - Step by Step</h1>
    
    <div class="test-section info">
        <h2>Step 5: Debug Image Paths</h2>
        <button onclick="testDirectImageURL()">Test Direct Image URL</button>
        <button onclick="testComplaintData()">Test Complaint Data</button>
        <button onclick="consoleDebug()">Console Debug</button>
        <button onclick="clearResults()">Clear Results</button>
    </div>

    <div id="results"></div>

    <script>
        window.API_BASE = 'http://localhost:5001';
        
        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-section ${type}`;
            div.innerHTML = `<h3>${new Date().toLocaleTimeString()}</h3><pre>${JSON.stringify(message, null, 2)}</pre>`;
            results.appendChild(div);
        }

        function testDirectImageURL() {
            log('Testing direct image URL construction...', 'info');
            
            // Test the exact format that should work
            const testImage = '/uploads/1775204357232-909725816-Screenshot 2026-04-03 130133.png';
            const fullURL = `${window.API_BASE}${testImage}`;
            
            log(`Testing URL: ${fullURL}`, 'info');
            
            const img = new Image();
            img.onload = () => {
                log(`SUCCESS: Image loaded from ${fullURL}`, 'success');
                // Show the image
                const results = document.getElementById('results');
                const imgDiv = document.createElement('div');
                imgDiv.className = 'test-section success';
                imgDiv.innerHTML = `<h3>Image Display Test</h3><img src="${fullURL}" style="max-width:300px;border:2px solid green;"><p>URL: ${fullURL}</p>`;
                results.appendChild(imgDiv);
            };
            img.onerror = () => {
                log(`FAILED: Image failed to load from ${fullURL}`, 'error');
                // Try alternative formats
                testAlternativeFormats();
            };
            img.src = fullURL;
        }

        function testAlternativeFormats() {
            log('Testing alternative URL formats...', 'info');
            
            const alternatives = [
                `${window.API_BASE}/uploads/1775204357232-909725816-Screenshot 2026-04-03 130133.png`,
                `${window.API_BASE}/uploads/1775204783321-108096103-Screenshot 2026-04-03 130123.png`,
                `http://localhost:5001/uploads/1775204357232-909725816-Screenshot 2026-04-03 130133.png`
            ];
            
            alternatives.forEach((url, index) => {
                const img = new Image();
                img.onload = () => log(`SUCCESS: Alternative ${index + 1}: ${url}`, 'success');
                img.onerror = () => log(`FAILED: Alternative ${index + 1}: ${url}`, 'error');
                img.src = url;
            });
        }

        async function testComplaintData() {
            log('Testing complaint data from database...', 'info');
            
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    log('No auth token found. Please login first.', 'error');
                    return;
                }

                const response = await fetch(`${window.API_BASE}/api/complaints/my`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    log(`Failed to fetch complaints: ${response.status}`, 'error');
                    return;
                }

                const data = await response.json();
                log(`Found ${data.complaints?.length || 0} complaints`, 'info');

                if (data.complaints) {
                    data.complaints.forEach(complaint => {
                        log(`Complaint #${complaint.id}:`, 'info');
                        log(`  - Title: ${complaint.title}`, 'info');
                        log(`  - Image URL: ${complaint.image_url}`, 'info');
                        log(`  - Full URL: ${window.API_BASE}${complaint.image_url}`, 'info');
                        
                        if (complaint.image_url) {
                            // Test the exact URL from database
                            const img = new Image();
                            img.onload = () => log(`SUCCESS: Complaint #${complaint.id} image loaded`, 'success');
                            img.onerror = () => log(`FAILED: Complaint #${complaint.id} image failed`, 'error');
                            img.src = `${window.API_BASE}${complaint.image_url}`;
                        }
                    });
                }
            } catch (error) {
                log(`Error testing complaint data: ${error.message}`, 'error');
            }
        }

        function consoleDebug() {
            log('Console Debug - Run these commands in browser console:', 'info');
            
            const debugCommands = `
// 1. Check API_BASE
console.log('API_BASE:', window.API_BASE);

// 2. Test image loading
const img = new Image();
img.onload = () => console.log('SUCCESS: Image loaded');
img.onerror = () => console.log('FAILED: Image failed');
img.src = 'http://localhost:5001/uploads/1775204357232-909725816-Screenshot 2026-04-03 130133.png';

// 3. Test complaint data
fetch('http://localhost:5001/api/complaints/my', {
  headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
})
.then(r => r.json())
.then(data => {
  console.log('Complaints:', data.complaints);
  data.complaints.forEach(c => {
    if (c.image_url) {
      console.log('Image URL:', c.image_url);
      console.log('Full URL:', window.API_BASE + c.image_url);
    }
  });
});
            `;
            
            log(debugCommands, 'info');
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        // Auto-run on page load
        window.addEventListener('load', () => {
            setTimeout(() => {
                log('Starting debug process...', 'info');
                log(`API_BASE is set to: ${window.API_BASE}`, 'info');
                testDirectImageURL();
            }, 1000);
        });
    </script>
</body>
</html>
