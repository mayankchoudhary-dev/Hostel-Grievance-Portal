<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct Register Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .direct-link { display: inline-block; margin: 10px; padding: 15px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Direct Register Test</h1>
    
    <div class="test-section info">
        <h2>Testing Register.html Direct Access</h2>
        <p>This page tests direct access to register.html without any server routing.</p>
        
        <a href="register.html" class="direct-link">📝 Open Register.html Directly</a>
        <button onclick="testDirectAccess()">Test Direct File Access</button>
        <button onclick="testServerRoute()">Test Server Route</button>
        <button onclick="clearResults()">Clear Results</button>
    </div>

    <div id="results"></div>

    <script>
        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-section ${type}`;
            div.innerHTML = `<h3>${new Date().toLocaleTimeString()}</h3><pre>${JSON.stringify(message, null, 2)}</pre>`;
            results.appendChild(div);
        }

        function testDirectAccess() {
            log('Testing direct file access...', 'info');
            
            // Try to open register.html directly
            const link = document.createElement('a');
            link.href = 'register.html';
            link.target = '_blank';
            link.click();
            
            log('Opened register.html in new tab', 'success');
        }

        function testServerRoute() {
            log('Testing server route for register.html...', 'info');
            
            fetch('/register.html')
                .then(response => {
                    if (response.ok) {
                        log(`✅ Server route works! Status: ${response.status}`, 'success');
                        log('Response type:', response.type);
                        log('Response URL:', response.url);
                    } else {
                        log(`❌ Server route failed! Status: ${response.status}`, 'error');
                        log('Response text:', response.statusText);
                    }
                })
                .catch(error => {
                    log(`❌ Network error: ${error.message}`, 'error');
                    log('This means frontend server is not running');
                });
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        // Auto-run on page load
        window.addEventListener('load', () => {
            log('Direct register test page loaded', 'info');
            log('Current URL:', window.location.href);
            log('Testing if frontend server is running...', 'info');
            
            // Test server health
            fetch('/health')
                .then(response => response.json())
                .then(data => {
                    log('✅ Frontend server is running', 'success');
                    log('Server response:', data);
                })
                .catch(error => {
                    log('❌ Frontend server not responding', 'error');
                    log('Error:', error.message);
                });
        });
    </script>
</body>
</html>
