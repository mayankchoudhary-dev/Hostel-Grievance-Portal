<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Register as a student on the Hostel Grievance Portal" />
  <title>Register | Hostel Grievance Portal</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card" style="max-width:480px;">
      <div class="auth-logo">
        <div class="logo-icon">🎓</div>
        <h1>Create Account</h1>
        <p>Register as a hostel student</p>
      </div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <input class="form-input" type="text" id="name" name="name"
            placeholder="John Doe" required autocomplete="name" />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email" name="email"
            placeholder="you@example.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label class="form-label" for="room_no">Room Number</label>
          <input class="form-input" type="text" id="room_no" name="room_no"
            placeholder="e.g. A-101" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password"
            placeholder="Minimum 6 characters" required autocomplete="new-password" />
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input class="form-input" type="password" id="confirmPassword" name="confirmPassword"
            placeholder="Re-enter password" required autocomplete="new-password" />
        </div>

        <div id="registerError" style="color:#ef4444;font-size:0.85rem;margin-bottom:0.75rem;display:none;"></div>

        <button type="submit" class="btn-auth" id="registerBtn">
          <span id="registerBtnText">Create Account</span>
          <span id="registerSpinner" class="spinner" style="display:none;"></span>
        </button>
      </form>

      <div class="divider"></div>
      <p class="auth-link">Already have an account? <a href="index.html">Sign in</a></p>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  
  <!-- Load environment first, then auth -->
  <script src="js/env.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const token = localStorage.getItem('hgp_token');
    const user = JSON.parse(localStorage.getItem('hgp_user') || 'null');
    if (token && user) {
      window.location.href = user.role === 'admin' ? 'admin-dashboard.html' : 'student-dashboard.html';
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      const btnText = document.getElementById('registerBtnText');
      const spinner = document.getElementById('registerSpinner');
      const errEl = document.getElementById('registerError');

      errEl.style.display = 'none';

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const room_no = document.getElementById('room_no').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!name || !email || !room_no || !password) {
        errEl.textContent = 'All fields are required.';
        errEl.style.display = 'block';
        return;
      }
      if (password !== confirmPassword) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
      }
      if (password.length < 6) {
        errEl.textContent = 'Password must be at least 6 characters.';
        errEl.style.display = 'block';
        return;
      }

      btnText.style.display = 'none';
      spinner.style.display = 'inline-block';
      btn.disabled = true;

      try {
        const data = await apiPost('/api/register', { name, email, password, room_no });
        localStorage.setItem('hgp_token', data.token);
        localStorage.setItem('hgp_user', JSON.stringify(data.user));
        showToast('Account created! Welcome, ' + data.user.name + '!', 'success');
        setTimeout(() => { window.location.href = 'student-dashboard.html'; }, 700);
      } catch (err) {
        errEl.textContent = err.message || 'Registration failed.';
        errEl.style.display = 'block';
      } finally {
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
